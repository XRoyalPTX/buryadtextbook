<!DOCTYPE html>
{% load static %}
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Сэсэн{% endblock %}</title>

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- ПОДКЛЮЧЕНИЕ BOOTSTRAP -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- ПОДКЛЮЧЕНИЕ OWL CAROUSEL -->
    <link href="{% static 'css/owl.carousel.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/owl.theme.default.min.css' %}" rel="stylesheet">

    <!-- ШРИФТЫ ARSENAL, TEKTUR, NUNITO -->
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">

    <!-- ПОДКЛЮЧЕНИЕ МОИХ СТИЛЕЙ -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extrahead %}{% endblock %}
</head>

<body>

    <header>

        <div class="in-header-container">
            <nav class="menu-btns d-none d-md-block">
                <a href="{% url 'home' %}" class="logo">cэсэн</a>
                <a href="{% url 'home' %}" class="menu-btn me-3 {% if request.path == '/home/' %}active{% endif %}">Главная</a>
                <a href="#" class="menu-btn mx-3 {% if request.path == '/courses/' %}active{% endif %}">Курсы</a>
            </nav>
            <nav class="menu-btns d-block d-md-none">
                <a href="{% url 'home' %}" class="logo">cэсэн</a>
                <a href="{% url 'home' %}" class="menu-btn me-2 {% if request.path == '/home/' %}active{% endif %}">Главная</a>
                <a href="#" class="menu-btn mx-2 {% if request.path == '/courses/' %}active{% endif %}">Курсы</a>
            </nav>

            <nav class="menu-help-btns d-none d-md-block">
                <a href="{% url 'login' %}" class="log-btn mx-3">Войти</a>
                <a href="#" class="ms-3"><img src="{% static 'images/ruslang.png' %}" height="24px" width="24px"></a>
            </nav>
            <nav class="menu-help-btns d-block d-md-none">
                <a href="{% url 'login' %}" class="log-btn mx-2">Войти</a>
                <a href="#" class="ms-2"><img src="{% static 'images/ruslang.png' %}" height="24px" width="24px"></a>
            </nav>
        </div>

    </header>

    <main class="container-fluid">
        {% block main %}Привет из base.html!{% endblock %}
    </main>

    <footer class="container-fluid">
        <p>Владислав Архинчеев</p>
        <p>exp@student.bmstu.ru</p>
    </footer>

    <!-- ПОДКЛЮЧЕНИЕ JS-СКРИПТОВ-->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/owl.carousel.min.js' %}"></script>
    {% block extrajs %}{% endblock %}

</body>
</html>
