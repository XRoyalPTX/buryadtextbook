<!DOCTYPE html>
{% load static %}
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Сэсэн{% endblock %}</title>

    <!-- ПОДКЛЮЧЕНИЕ BOOTSTRAP -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <!-- ШРИФТЫ ARSENAL, TEKTUR (локально) -->
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">

    <!-- ПОДКЛЮЧЕНИЕ МОИХ СТИЛЕЙ -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <!-- ШРИФТ ОНЛАЙН ARSENAL -->
    <!--
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    -->

    <!-- ШРИФТ ОНЛАЙН TEKTUR-->
    <!--
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    -->

    {% block extrahead %}{% endblock %}
</head>
<body>

    <header class="container-fluid text-center">
        <div class="col-12 logo d-none d-md-block">
            <a href="{% url 'home' %}">СЭСЭН</a><span class=> | Буряад хэлэнэй сахим hураха ном</span>
        </div>
        <div class="col-12 logo d-block d-md-none">
            <a href="{% url 'home' %}">СЭСЭН</a>
        </div>
        <div class="row justify-content-between">

            <a class="col menu-button" href="{% url 'home' %}">Главная</a>

            <a class="col menu-button" href="#">Курсы</a>

            <a class="col menu-button" href="#">О нас</a>

            <a class="col-auto log-in-button" href="#">Войти</a>

            <a class="col-auto menu-button dropdown-toggle d-block" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-expanded="false">
                🌐
            </a>
            <ul class="dropdown-menu text-center" aria-labelledby="dropdownMenuLink" style="position: absolute; width: auto; min-width: 50px;">
                <li><a class="dropdown-item" href="#"><img src="{% static 'images/ruslang.png' %}" style="height: 17px;">&nbsp;Русский</a></li>
                <li><a class="dropdown-item" href="#"><img src="{% static 'images/englang.png' %}" style="height: 17px;">&nbsp;English</a></li>
            </ul>
        </div>
    </header>

    <main class="container-fluid">
        {% block main %}Привет из base.html!{% endblock %}
    </main>

    <footer class="container-fluid">
        <p>Владислав Архинчеев</p>
        <p>exp@student.bmstu.ru</p>
    </footer>

</body>
</html>
